        - heading "Warren Buffett là ai? Từ cậu bé bán báo đến huyền thoại phố Wall" [level=2] [ref=e95]
        - paragraph [ref=e96]: Warren Buffett sinh năm 1930 tại Omaha, Nebraska, Mỹ. Ngay từ khi còn là cậu bé, ông đã bộc lộ niềm đam mê với các con số và kinh doanh — từ bán nước ngọt, giao báo, đến lắp đặt máy chơi game.
        - paragraph [ref=e97]: Bước ngoặt lớn nhất diễn ra khi ông đọc cuốn sách “Nhà đầu tư thông minh” của Benjamin Graham và quyết định nộp đơn vào Đại học Columbia để được trực tiếp học từ Graham.
        - paragraph [ref=e98]:
          - img "Bàn làm việc với sổ sách kế toán và tách trà biểu trưng cho sự điềm tĩnh của Buffett" [ref=e99]
          - emphasis [ref=e100]: "Ảnh: Sean Pollock / Unsplash"
        - paragraph [ref=e101]: Sau khi tích lũy kinh nghiệm và vốn liếng, Buffett mua lại Berkshire Hathaway — khi đó là một công ty dệt may đang gặp khó khăn — và từng bước chuyển đổi nó thành tập đoàn đầu tư đa ngành. Tính đến năm 2024, vốn hóa Berkshire Hathaway vượt 900 tỷ USD với các khoản đầu tư lớn vào Apple, Coca-Cola, American Express, Bank of America.
        - 'heading "Triết lý 1: Mua doanh nghiệp tốt thay vì mua cổ phiếu rẻ" [level=2] [ref=e102]'
        - paragraph [ref=e103]: Khác với người thầy Benjamin Graham vốn chỉ tập trung vào tài sản thanh lý giá rẻ, Buffett — dưới ảnh hưởng của người cộng sự Charlie Munger — phát triển triết lý của mình lên tầm cao mới.
        - paragraph [ref=e104]: Ông chấp nhận mua một doanh nghiệp tuyệt vời với mức giá hợp lý, thay vì mua một doanh nghiệp trung bình với mức giá rẻ mạt.
        - paragraph [ref=e105]: Doanh nghiệp tuyệt vời là những doanh nghiệp sở hữu con hào kinh tế (Economic Moat) rộng lớn. Đó là lợi thế cạnh tranh độc quyền giúp doanh nghiệp ngăn chặn sự xâm nhập của các đối thủ và bảo vệ biên lợi nhuận. Thương hiệu Coca-Cola, hệ sinh thái khép kín của Apple, hay mạng lưới thanh toán của Visa là những ví dụ điển hình.
        - 'heading "Triết lý 2: Vòng tròn năng lực (Circle of Competence)" [level=2] [ref=e106]'
        - paragraph [ref=e107]: "Buffett luôn khuyên: chỉ đầu tư vào những lĩnh vực và doanh nghiệp mà bạn thực sự hiểu rõ cách họ tạo ra tiền."
        - paragraph [ref=e108]: Vòng tròn năng lực của mỗi người là có hạn. Nếu bạn làm việc trong ngành công nghệ thông tin, bạn hiểu các doanh nghiệp phần mềm hơn người khác. Nếu bạn làm trong ngành y tế, bạn hiểu các công ty dược phẩm hơn.
        - paragraph [ref=e109]: Bước chân ra ngoài vòng tròn năng lực để mua những cổ phiếu hot theo lời đồn thổi là con đường dẫn đến thua lỗ. Buffett từng từ chối đầu tư vào các công ty công nghệ trong bong bóng Dot-com cuối thập niên 1990 vì ông không hiểu cách họ kiếm tiền. Quyết định đó giúp ông tránh được một trong những vụ sụp đổ tài chính lớn nhất lịch sử.
        - 'heading "Triết lý 3: Thời gian nắm giữ ưa thích là mãi mãi" [level=2] [ref=e110]'
        - paragraph [ref=e111]: Buffett nổi tiếng với tính kiên nhẫn tột độ. Ông coi việc mua cổ phiếu giống như mua lại một phần doanh nghiệp thực tế. Nếu doanh nghiệp liên tục tăng trưởng lợi nhuận, giá trị cổ phiếu chắc chắn sẽ tăng theo trong dài hạn.
        - paragraph [ref=e112]: "Ông từng nói: “Nếu bạn không sẵn sàng sở hữu một cổ phiếu trong 10 năm, thì đừng nghĩ đến việc sở hữu nó trong 10 phút.”"
        - paragraph [ref=e113]: Việc liên tục mua đi bán lại để lướt sóng ngắn hạn chỉ làm tốn phí giao dịch, thuế và dẫn đến các quyết định sai lầm theo cảm xúc đám đông.
        - 'heading "Triết lý 4: Biên an toàn (Margin of Safety) và ngược chiều đám đông" [level=2] [ref=e114]'
        - paragraph [ref=e115]: "Buffett kế thừa từ Graham một nguyên tắc cốt lõi: luôn mua cổ phiếu ở mức giá thấp hơn giá trị nội tại thực sự của doanh nghiệp. Khoảng chênh lệch đó gọi là biên an toàn."
        - paragraph [ref=e116]: Biên an toàn đóng vai trò như đệm bảo vệ nếu phân tích của bạn sai — hoặc thị trường tiếp tục giảm sau khi bạn mua. Buffett thường mua khi thị trường hoảng loạn, người khác đang bán tháo.
        - paragraph [ref=e117]: "Câu nói nổi tiếng nhất của ông: “Hãy tham lam khi người khác sợ hãi, và hãy sợ hãi khi người khác tham lam.” Đây không phải lời khuyên lướt sóng — mà là triết lý định giá. Khi thị trường sụt giảm mạnh, cổ phiếu của những doanh nghiệp tốt trở nên rẻ hơn giá trị thực của chúng. Đó là thời điểm Buffett mua."
        - heading "Áp dụng triết lý Buffett ở Việt Nam như thế nào?" [level=2] [ref=e118]
        - paragraph [ref=e119]: "Bạn không cần vốn hàng tỷ để bắt đầu. Bốn điều Buffett dạy bạn có thể áp dụng ngay:"
        - paragraph [ref=e120]:
          - strong [ref=e121]: 1. Chỉ mua cổ phiếu bạn hiểu.
          - text: "Trước khi mua cổ phiếu VCB, FPT hay MWG, hãy đọc báo cáo thường niên và trả lời được: doanh nghiệp này kiếm tiền bằng cách nào, ai là khách hàng, và đối thủ của họ là ai."
        - paragraph [ref=e122]:
          - strong [ref=e123]: 2. Tìm con hào kinh tế ở thị trường VN.
          - text: Thương hiệu mạnh (Vinamilk, Masan), mạng lưới phân phối độc quyền, chi phí chuyển đổi cao (phần mềm kế toán, ngân hàng) — đây là những dấu hiệu của con hào kinh tế tại Việt Nam.
        - paragraph [ref=e124]:
          - strong [ref=e125]: 3. Mua khi thị trường sợ hãi.
          - text: VN-Index từng giảm 50% trong năm 2022. Những nhà đầu tư kiên nhẫn mua vào khoảng thời gian đó đã thu lợi đáng kể trong 18 tháng tiếp theo.
        - paragraph [ref=e126]:
          - strong [ref=e127]: 4. Nếu chưa có kỹ năng phân tích, mua ETF.
          - text: Chính Buffett khuyên nhà đầu tư cá nhân không có thời gian phân tích nên mua quỹ chỉ số định kỳ. Tại VN, E1VFVN30 hoặc FUEVFVND là lựa chọn tương đương.
        - separator [ref=e128]
        - paragraph [ref=e129]: Warren Buffett không có công thức bí mật. Ông chỉ áp dụng nhất quán những nguyên tắc đơn giản trong suốt 70 năm — hiểu doanh nghiệp, mua khi rẻ, giữ khi tốt, bỏ qua tiếng ồn thị trường. Sự giàu có của ông là bằng chứng cho sức mạnh của lãi kép và kỷ luật dài hạn.

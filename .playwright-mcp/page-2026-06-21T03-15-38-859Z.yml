        - generic [ref=e199]:
          - heading "Hướng dẫn mở tài khoản DSC Securities" [level=2] [ref=e200]
          - list [ref=e201]:
            - listitem [ref=e202]:
              - generic [ref=e203]: "1"
              - generic [ref=e204]:
                - strong [ref=e205]: Tải ứng dụng DSC Trade
                - paragraph [ref=e206]: Vào App Store (iOS) hoặc Google Play (Android), tìm "DSC Trade" — biểu tượng logo xanh lá của Chứng khoán DSC. Cài đặt miễn phí, dung lượng khoảng 80 MB. Không cần cài thêm phần mềm nào khác; toàn bộ quy trình mở tài khoản lẫn giao dịch sau này đều thực hiện qua app này.
            - listitem [ref=e207]:
              - generic [ref=e208]: "2"
              - generic [ref=e209]:
                - strong [ref=e210]: Điền thông tin cá nhân
                - paragraph [ref=e211]: Mở app, chọn "Mở tài khoản" → nhập số điện thoại đang dùng (sẽ nhận OTP xác nhận) → điền họ tên, ngày sinh, địa chỉ thường trú đúng theo CCCD. DSC yêu cầu email để gửi sao kê và thông báo giao dịch — nên dùng email cá nhân thường xuyên kiểm tra.
            - listitem [ref=e212]:
              - generic [ref=e213]: "3"
              - generic [ref=e214]:
                - strong [ref=e215]: Xác minh danh tính eKYC (CCCD gắn chip)
                - paragraph [ref=e216]: "DSC dùng công nghệ eKYC tích hợp NFC cho CCCD gắn chip: (1) Chụp mặt trước và mặt sau CCCD trong khung hướng dẫn — đảm bảo ảnh rõ nét, không bị lóa đèn flash; (2) Quét chip NFC bằng cách đặt điện thoại lên mặt sau CCCD đến khi app báo thành công; (3) Chụp ảnh chân dung trực tiếp theo hướng dẫn khuôn mặt. Toàn bộ bước eKYC mất khoảng 3–5 phút nếu CCCD còn mới và chip không bị lỗi."
            - listitem [ref=e217]:
              - generic [ref=e218]: "4"
              - generic [ref=e219]:
                - strong [ref=e220]: Chờ phê duyệt tài khoản
                - paragraph [ref=e221]: DSC xét duyệt trong ngày làm việc, thường trong vòng 1–3 giờ với hồ sơ nộp trước 15:00. Bạn sẽ nhận SMS và email thông báo khi tài khoản được kích hoạt, kèm số tài khoản chứng khoán (bắt đầu bằng ký hiệu DSC). Nếu hồ sơ thiếu thông tin, nhân viên DSC sẽ gọi điện xác nhận trực tiếp.
            - listitem [ref=e222]:
              - generic [ref=e223]: "5"
              - generic [ref=e224]:
                - strong [ref=e225]: Nạp tiền và thiết lập tài khoản ngân hàng liên kết
                - paragraph [ref=e226]: "Trong app DSC Trade, vào mục \"Nạp tiền\" → chọn ngân hàng liên kết (DSC hỗ trợ hầu hết ngân hàng lớn: Vietcombank, BIDV, Techcombank, MB, VPBank...) → chuyển khoản đúng nội dung \"[Số tài khoản DSC] - [Họ tên]\". Tiền vào tài khoản chứng khoán trong vòng 15–30 phút. Không có số dư tối thiểu bắt buộc."
            - listitem [ref=e227]:
              - generic [ref=e228]: "6"
              - generic [ref=e229]:
                - strong [ref=e230]: Đặt lệnh giao dịch đầu tiên
                - paragraph [ref=e231]: Vào "Giao dịch" → chọn mã cổ phiếu → nhập khối lượng và giá → xác nhận lệnh bằng mã PIN giao dịch (thiết lập lần đầu). Lệnh khớp trong phiên liên tục (9:15–14:30); tiền bán về tài khoản sau T+2 theo quy định HOSE/HNX. Với lệnh mua, tiền bị phong tỏa ngay khi đặt và hoàn về nếu lệnh không khớp hết.
          - generic [ref=e232]:

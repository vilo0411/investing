      - heading "DSC Securities là công ty gì?" [level=2] [ref=e291]
      - paragraph [ref=e292]: "Chứng khoán DSC (tên đầy đủ: Công ty Cổ phần Chứng khoán DSC) là thành viên thuộc Tập đoàn Dầu khí Việt Nam (PVN). Công ty được thành lập năm 2007 và được Ủy ban Chứng khoán Nhà nước cấp phép hoạt động đầy đủ trong lĩnh vực môi giới, tư vấn và tự doanh chứng khoán."

        - paragraph [ref=e156]: Người mới tham gia thị trường nên bắt đầu bằng việc tìm hiểu các doanh nghiệp có nền tảng cơ bản vững chắc. Bạn có thể sử dụng phân tích cơ bản để đánh giá sức mạnh nội tại của doanh nghiệp. Sau đó, hãy dùng phân tích kỹ thuật cơ bản để chọn thời điểm mua có lợi nhất.
        - paragraph [ref=e157]: Nhiều nhà đầu tư giàu kinh nghiệm kết hợp cả hai phương pháp này để tối ưu danh mục. Họ dùng phân tích cơ bản để chọn ra danh sách các cổ phiếu tốt. Sau đó, họ dùng phân tích kỹ thuật để tìm điểm mua vào với mức giá an toàn nhất.
        - heading "3 quy tắc vàng để sống sót trên thị trường" [level=2] [ref=e158]
        - paragraph [ref=e159]: Thị trường chứng khoán luôn đi kèm với rủi ro biến động giá ngắn hạn. Để bảo vệ nguồn vốn tích lũy của mình, bạn cần tuân thủ nghiêm ngặt các nguyên tắc quản trị rủi ro cơ bản.
        - paragraph [ref=e160]: Khi thị trường tăng điểm, margin giúp bạn nhân đôi hoặc nhân ba lợi nhuận rất nhanh chóng. Ngược lại, khi thị trường sụt giảm, đòn bẩy tài chính này sẽ phóng đại khoản lỗ của bạn tương ứng. Công ty chứng khoán có quyền tự động bán giải chấp cổ phiếu nếu tỷ lệ tài sản giảm quá sâu.
        - paragraph [ref=e161]: Đa dạng hóa không đơn thuần là việc bạn mua thật nhiều mã cổ phiếu khác nhau. Bạn nên phân bổ vốn vào các nhóm ngành không liên quan trực tiếp như ngân hàng và công nghệ. Nếu một ngành gặp khó khăn, các ngành còn lại sẽ giúp cân bằng danh mục tài sản của bạn.
        - list [ref=e162]:
          - listitem [ref=e163]:
            - paragraph [ref=e164]:
              - strong [ref=e165]: Quy tắc 1. Đa dạng hóa danh mục.
              - text: Bạn không nên tập trung toàn bộ số vốn của mình vào một cổ phiếu duy nhất. Hãy phân bổ tiền vào 3 đến 5 mã cổ phiếu thuộc các ngành khác nhau để giảm thiểu rủi ro.
          - listitem [ref=e166]:
            - paragraph [ref=e167]:
              - strong [ref=e168]: Quy tắc 2. Hạn chế sử dụng margin.
              - text: Margin hay
              - link "giao dịch ký quỹ (margin)" [ref=e169] [cursor=pointer]:
                - /url: /dau-tu/co-phieu/margin-la-gi/
              - text: là việc vay tiền của công ty chứng khoán để mua thêm cổ phiếu. Công cụ này là con dao hai lưỡi có thể khiến tài khoản của bạn bị tổn thất lớn rất nhanh.
          - listitem [ref=e170]:

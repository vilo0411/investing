        - heading "Bản chất của kiếm tiền từ cổ phiếu" [level=2] [ref=e94]
        - paragraph [ref=e95]: Để bắt đầu, bạn cần hiểu rõ bản chất của việc sở hữu cổ phiếu. Hãy hình dung bạn và hai người bạn cùng góp vốn mở một quán trà sữa tại TP.HCM.
        - paragraph [ref=e96]: Tổng số vốn ban đầu để mở quán là 100 triệu đồng. Bạn góp 20 triệu đồng, tương đương sở hữu 20% cổ phần của quán trà sữa đó.
        - paragraph [ref=e97]: Khi quán kinh doanh có lãi và trích một phần tiền chia cho các thành viên, bạn nhận được cổ tức. Nếu quán làm ăn phát triển và mở rộng thêm chi nhánh, giá trị thương hiệu sẽ tăng lên. Khi đó, bạn có thể bán lại 20% cổ phần với giá 50 triệu đồng để hưởng chênh lệch giá.
        - paragraph [ref=e98]:
          - text: Đầu tư
          - link "cổ phiếu" [ref=e99] [cursor=pointer]:
            - /url: /dau-tu/co-phieu/co-phieu-la-gi/
          - text: trên thị trường chứng khoán cũng vận hành tương tự như ví dụ trên. Bạn mua cổ phiếu của các doanh nghiệp niêm yết tức là bạn đang góp vốn vào doanh nghiệp. Hai nguồn thu nhập chính của bạn sẽ đến từ việc nhận
          - link "cổ tức" [ref=e100] [cursor=pointer]:
            - /url: /dau-tu/co-phieu/co-tuc-la-gi/
          - text: và chênh lệch giá cổ phiếu.
        - paragraph [ref=e101]:
          - img "Máy tính và tiền minh họa cho việc tính toán vốn đầu tư cổ phiếu" [ref=e102]
          - emphasis [ref=e103]: "Ảnh: Jakub Żerdzicki / Unsplash"
        - paragraph [ref=e104]: Thông thường, các doanh nghiệp trẻ đang phát triển nhanh sẽ ít khi trả cổ tức bằng tiền mặt. Họ giữ lại lợi nhuận để tiếp tục tái đầu tư kinh doanh. Do đó, người mua nhóm này thường kỳ vọng vào sự tăng trưởng của giá cổ phiếu trên sàn.
        - paragraph [ref=e105]: Ngược lại, các tổng công ty lớn hoạt động ổn định thường trả cổ tức đều đặn hàng năm. Nhóm cổ phiếu này đem lại dòng tiền mặt ổn định nhưng giá ít khi tăng đột biến.
        - heading "4 bước bắt đầu đầu tư cổ phiếu cho người mới" [level=2] [ref=e106]
        - paragraph [ref=e107]: Để bắt đầu giao dịch trên thị trường Việt Nam, bạn cần thực hiện theo quy trình 4 bước đơn giản. Mọi thủ tục hiện nay đều được số hóa nhằm hỗ trợ nhà đầu tư.
        - paragraph [ref=e108]: Trước khi thực hiện bước đầu tiên, bạn hãy chọn một công ty chứng khoán phù hợp. Các yếu tố cần xem xét bao gồm phí giao dịch và chất lượng ứng dụng điện thoại.
        - list [ref=e109]:
          - listitem [ref=e110]:
            - paragraph [ref=e111]:
              - strong [ref=e112]: Bước 1. Mở tài khoản trực tuyến.
              - text: Bạn chỉ cần chuẩn bị Căn cước công dân gắn chip và một điện thoại có camera. Việc định danh eKYC trực tuyến hoàn toàn miễn phí và chỉ mất từ 3 đến 5 phút để kích hoạt tài khoản của bạn.
          - listitem [ref=e113]:
            - paragraph [ref=e114]:
              - strong [ref=e115]: Bước 2. Nạp tiền vào tài khoản.
              - text: Sau khi có số tài khoản chứng khoán, bạn chuyển khoản từ ngân hàng của mình vào. Các công ty chứng khoán đều hướng dẫn chi tiết cách viết nội dung chuyển khoản để tiền vào đúng tài khoản của bạn.
          - listitem [ref=e116]:
            - paragraph [ref=e117]:
              - strong [ref=e118]: Bước 3. Tìm hiểu và chọn cổ phiếu.
              - text: Bạn nên bắt đầu bằng cách tìm hiểu các doanh nghiệp lớn quen thuộc trên thị trường. Hãy đọc các thông tin cơ bản về doanh nghiệp trước khi quyết định mua.
          - listitem [ref=e119]:
            - paragraph [ref=e120]:
              - strong [ref=e121]: Bước 4. Đặt lệnh mua cổ phiếu.
              - text: Bạn đăng nhập vào ứng dụng của công ty chứng khoán, chọn mã cổ phiếu, nhập số lượng và mức giá mong muốn rồi ấn xác nhận. Lô tối thiểu để giao dịch trên sàn HOSE và HNX là 100 cổ phiếu.
        - paragraph [ref=e122]: Quy định lô tối thiểu 100 cổ phiếu có nghĩa là số vốn ban đầu sẽ phụ thuộc vào giá cổ phiếu bạn chọn. Ví dụ, nếu cổ phiếu có giá 15.000 đồng/cổ phiếu, số vốn tối thiểu để mua 100 cổ phiếu là 1,5 triệu đồng. Nhưng nếu cổ phiếu giá 100.000 đồng, bạn cần ít nhất 10 triệu đồng.
        - paragraph [ref=e123]: Ngoài quy định về lô, bạn cần lưu ý chu kỳ thanh toán T+2 của thị trường chứng khoán Việt Nam. Sau khi khớp lệnh mua thành công, cổ phiếu sẽ về tài khoản của bạn vào chiều ngày làm việc thứ hai tiếp theo.
        - paragraph [ref=e124]: Ngoài tiền mua cổ phiếu, bạn cần trả một khoản phí giao dịch nhỏ cho mỗi lần mua hoặc bán. Phí này thường dao động từ 0,1% đến 0,2% giá trị khớp lệnh.
        - heading "Cách chọn cổ phiếu tốt cho danh mục đầu tư" [level=2] [ref=e125]
        - paragraph [ref=e126]: Để tìm kiếm cơ hội trên thị trường, các nhà đầu tư thường sử dụng hai phương pháp phân tích phổ biến. Mỗi phương pháp giải quyết một bài toán khác nhau trong việc ra quyết định.
        - paragraph [ref=e127]: Khi thực hiện phân tích cơ bản, bạn cần chú trọng vào các chỉ số tài chính quan trọng. Hãy tìm các doanh nghiệp có doanh thu và lợi nhuận tăng trưởng đều qua từng năm. Các chỉ số như P/E hay ROE sẽ giúp bạn đánh giá hiệu quả sử dụng vốn của doanh nghiệp.
        - paragraph [ref=e128]: Đối với phân tích kỹ thuật, bạn sẽ tập trung quan sát đồ thị giá để tìm điểm mua tối ưu. Việc theo dõi xu hướng giúp bạn tránh việc mua cổ phiếu khi giá đang trên đà giảm. Các chỉ chỉ báo kỹ thuật như RSI, đường xu hướng sẽ chỉ ra thời điểm thị trường ở vùng quá mua.

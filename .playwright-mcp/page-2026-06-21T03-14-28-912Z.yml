          - text: Nhiều người nghĩ đầu tư cổ phiếu cần vốn lớn hoặc phải theo dõi bảng điện liên tục. Sự thật là bạn hoàn toàn có thể bắt đầu tích lũy chỉ từ vài trăm nghìn đồng. Bài viết này từ
          - strong [ref=e91]:

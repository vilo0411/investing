description = "Request cross-AI peer review of phase plans from external AI CLIs"
prompt = "<objective>\nInvoke external AI CLIs (Gemini, Claude, Codex, OpenCode, Qwen Code, Cursor) to independently review phase plans.\nProduces a structured REVIEWS.md with per-reviewer feedback that can be fed back into\nplanning via /gsd:plan-phase --reviews.\n\n**Flow:** Detect CLIs → Build review prompt → Invoke each CLI → Collect responses → Write REVIEWS.md\n</objective>\n\n<execution_context>\n@/Users/nguyenvietloc/Documents/investing/.gemini/gsd-core/workflows/review.md\n</execution_context>\n\n<context>\nPhase number: extracted from {{args}} (required)\n\n**Flags:**\n- `--gemini` — Include Gemini CLI review\n- `--claude` — Include Claude CLI review (uses separate session)\n- `--codex` — Include Codex CLI review\n- `--opencode` — Include OpenCode review (uses model from user's OpenCode config)\n- `--qwen` — Include Qwen Code review (Alibaba Qwen models)\n- `--cursor` — Include Cursor agent review\n- `--agy` / `--antigravity` — Include Antigravity CLI review\n- `--all` — Include all available CLIs\n</context>\n\n<process>\nExecute end-to-end.\n</process>"

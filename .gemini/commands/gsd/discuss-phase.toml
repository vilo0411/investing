description = "Gather phase context through adaptive questioning before planning."
prompt = "<objective>\nExtract implementation decisions that downstream agents need — researcher and planner will use CONTEXT.md to know what to investigate and what choices are locked.\n\n**How it works:**\n1. Load prior context (PROJECT.md, REQUIREMENTS.md, STATE.md, prior CONTEXT.md files)\n2. Scout codebase for reusable assets and patterns\n3. Analyze phase — skip gray areas already decided in prior phases\n4. Present remaining gray areas — user selects which to discuss\n5. Deep-dive each selected area until satisfied\n6. Create CONTEXT.md with decisions that guide research and planning\n\n**Output:** `{phase_num}-CONTEXT.md` — decisions clear enough that downstream agents can act without asking the user again\n</objective>\n\n<execution_context>\nWorkflow files are loaded on-demand in the <process> section below — not upfront.\nDo not pre-load any workflow files before reading the mode routing instructions.\n</execution_context>\n\n<runtime_note>\n**Copilot (VS Code):** Use `vscode_askquestions` wherever this workflow calls `conversational prompting`. They are equivalent — `vscode_askquestions` is the VS Code Copilot implementation of the same interactive question API.\n</runtime_note>\n\n<context>\nPhase number: {{args}} (required)\n\nContext files are resolved in-workflow using `init phase-op` and roadmap/state tool calls.\n</context>\n\n<process>\n**Mode routing:**\n```bash\n_GSD_SHIM_NAME=\"gsd-tools.cjs\"; _GSD_RUNTIME_ROOT=\"${RUNTIME_DIR:-$(git rev-parse --show-toplevel 2>/dev/null || pwd)}\"; GSD_TOOLS=\"${_GSD_RUNTIME_ROOT}/gsd-core/bin/${_GSD_SHIM_NAME}\"; if [ -f \"$GSD_TOOLS\" ]; then gsd_run() { node \"$GSD_TOOLS\" \"$@\"; }; elif [ -f \"${_GSD_RUNTIME_ROOT}/.claude/gsd-core/bin/${_GSD_SHIM_NAME}\" ]; then GSD_TOOLS=\"${_GSD_RUNTIME_ROOT}/.claude/gsd-core/bin/${_GSD_SHIM_NAME}\"; gsd_run() { node \"$GSD_TOOLS\" \"$@\"; }; elif command -v gsd-tools >/dev/null 2>&1; then GSD_TOOLS=\"$(command -v gsd-tools)\"; gsd_run() { \"$GSD_TOOLS\" \"$@\"; }; elif [ -f \"/Users/nguyenvietloc/Documents/investing/.gemini/gsd-core/bin/${_GSD_SHIM_NAME}\" ]; then GSD_TOOLS=\"/Users/nguyenvietloc/Documents/investing/.gemini/gsd-core/bin/${_GSD_SHIM_NAME}\"; gsd_run() { node \"$GSD_TOOLS\" \"$@\"; }; else echo \"ERROR: gsd-tools.cjs not found at $GSD_TOOLS and gsd-tools is not on PATH. Run: npx -y @opengsd/gsd-core@latest --claude --local\" >&2; exit 1; fi\nDISCUSS_MODE=$(gsd_run query config-get workflow.discuss_mode 2>/dev/null || echo \"discuss\")\n```\n\nIf `--assumptions` is in {{args}}:\nRead and execute `/Users/nguyenvietloc/Documents/investing/.gemini/gsd-core/workflows/list-phase-assumptions.md` end-to-end.\nStop here.\n\nOtherwise, if `DISCUSS_MODE` is `\"assumptions\"`:\nRead and execute `/Users/nguyenvietloc/Documents/investing/.gemini/gsd-core/workflows/discuss-phase-assumptions.md` end-to-end.\n\nOtherwise (`\"discuss\"` / unset / any other value):\nRead and execute `/Users/nguyenvietloc/Documents/investing/.gemini/gsd-core/workflows/discuss-phase.md` end-to-end.\n\n**MANDATORY:** Read the appropriate workflow file BEFORE taking any action. The objective and success_criteria sections in this command file are summaries — the workflow file contains the complete step-by-step process with all required behaviors, config checks, and interaction patterns. Do not improvise from the summary.\n\n**Lazy loading:** `templates/context.md` is loaded inside the `write_context` step of the active workflow. `discuss-phase-power.md` is loaded inside `discuss-phase.md` when `--power` is detected. Do not load either here.\n</process>\n\n<success_criteria>\n- Prior context loaded and applied (no re-asking decided questions)\n- Gray areas identified through intelligent analysis\n- User chose which areas to discuss\n- Each selected area explored until satisfied\n- Scope creep redirected to deferred ideas\n- CONTEXT.md captures decisions, not vague vision\n- User knows next steps\n</success_criteria>"

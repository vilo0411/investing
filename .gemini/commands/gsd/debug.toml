description = "Systematic debugging with persistent state across context resets"
prompt = "<objective>\nDebug issues using scientific method with subagent isolation.\n\n**Orchestrator role:** Gather symptoms, spawn gsd-debugger agent, handle checkpoints, spawn continuations.\n\n**Flags:**\n- `--diagnose` — Diagnose only. Returns a Root Cause Report without applying a fix.\n\n**Subcommands:** `list` · `status <slug>` · `continue <slug>`\n</objective>\n\n<available_agent_types>\nValid GSD subagent types (use exact names — do not fall back to 'general-purpose'):\n- gsd-debug-session-manager — manages debug checkpoint/continuation loop in isolated context\n- gsd-debugger — investigates bugs using scientific method\n</available_agent_types>\n\n<execution_context>\n@/Users/nguyenvietloc/Documents/investing/.gemini/gsd-core/workflows/debug.md\n</execution_context>\n\n<context>\nUser's input: {{args}}\n\nParse subcommands and flags from {{args}} BEFORE the active-session check:\n- If {{args}} starts with \"list\": SUBCMD=list, no further args\n- If {{args}} starts with \"status \": SUBCMD=status, SLUG=remainder (trim whitespace)\n- If {{args}} starts with \"continue \": SUBCMD=continue, SLUG=remainder (trim whitespace)\n- If {{args}} contains `--diagnose`: SUBCMD=debug, diagnose_only=true, strip `--diagnose` from description\n- Otherwise: SUBCMD=debug, diagnose_only=false\n\nCheck for active sessions (used for non-list/status/continue flows):\n```bash\nls .planning/debug/*.md 2>/dev/null | grep -v resolved | head -5\n```\n</context>\n\n<process>\nExecute end-to-end.\n</process>"

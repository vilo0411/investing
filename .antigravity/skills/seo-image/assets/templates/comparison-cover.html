<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparison Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0f1117;
    overflow: hidden;
  }

  .cover {
    width: 1200px;
    height: 630px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    position: relative;
  }

  /* Subtle texture overlay */
  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 80% 50%, rgba(20,184,166,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .side {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 56px;
    gap: 20px;
    position: relative;
  }

  .side-left  { background: rgba(255,255,255,0.02); }
  .side-right { background: rgba(255,255,255,0.02); }

  /* Vertical divider lines on each side of VS */
  .side-left::after, .side-right::before {
    content: '';
    position: absolute;
    top: 15%;
    width: 1px;
    height: 70%;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.12), transparent);
  }
  .side-left::after  { right: 0; }
  .side-right::before { left: 0; }

  .company-logo {
    width: 96px;
    height: 96px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .company-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 12px;
  }

  /* Fallback monogram when no logo */
  .company-logo .monogram {
    font-size: 36px;
    font-weight: 800;
    color: rgba(255,255,255,0.7);
    letter-spacing: -1px;
  }

  .company-name {
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    line-height: 1.2;
    letter-spacing: -0.5px;
  }

  .company-tagline {
    font-size: 15px;
    color: rgba(255,255,255,0.45);
    text-align: center;
    line-height: 1.5;
    max-width: 280px;
  }

  /* VS divider */
  .vs-divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 80px;
    gap: 8px;
    z-index: 2;
  }

  .vs-badge {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.5px;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.25), 0 8px 24px rgba(99,102,241,0.3);
  }

  /* Bottom label bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 52px;
    background: rgba(255,255,255,0.03);
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .bottom-bar .site-name {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .bottom-bar .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }

  .bottom-bar .article-label {
    font-size: 13px;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
<div class="cover">

  <!-- LEFT: Company A -->
  <div class="side side-left">
    <div class="company-logo">
      <!-- Option 1: dùng img nếu có logo URL -->
      <!-- <img src="LOGO_URL_A" alt="COMPANY_A"> -->
      <!-- Option 2: dùng monogram -->
      <span class="monogram">TICKER_A</span>
    </div>
    <div class="company-name">COMPANY_A</div>
    <div class="company-tagline">TAGLINE_A</div>
  </div>

  <!-- CENTER: VS -->
  <div class="vs-divider">
    <div class="vs-badge">VS</div>
  </div>

  <!-- RIGHT: Company B -->
  <div class="side side-right">
    <div class="company-logo">
      <!-- Option 1: dùng img nếu có logo URL -->
      <!-- <img src="LOGO_URL_B" alt="COMPANY_B"> -->
      <!-- Option 2: dùng monogram -->
      <span class="monogram">TICKER_B</span>
    </div>
    <div class="company-name">COMPANY_B</div>
    <div class="company-tagline">TAGLINE_B</div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <span class="site-name">Value Investing</span>
    <span class="dot"></span>
    <span class="article-label">So sánh chi tiết YEAR</span>
  </div>

</div>
</body>
</html>
